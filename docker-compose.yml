services:
  openclaw-openwebui-moss-provider:
    build:
      context: .
      dockerfile: Dockerfile
    image: moss/openclaw-openwebui-moss-provider:local
    restart: unless-stopped
    environment:
      OPENCLAW_API_URL: http://host.docker.internal:3000/api/chat
      MOSS_MODELS_DIR: /app/moss-models
      MOSS_PROVIDER_HOST: 0.0.0.0
      MOSS_PROVIDER_PORT: 4000
      LOG_LEVEL: info
    ports:
      - "4000:4000"
    volumes:
      - ${HOME}/.openclaw/workspace/moss-models:/app/moss-models:ro
    extra_hosts:
      - host.docker.internal:host-gateway
